services:
  # ─── Frontend: Next.js ────────────────────────────────────────
  - type: web
    name: bella-vista-restaurant
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 20
