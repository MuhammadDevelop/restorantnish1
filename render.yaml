services:
  # ─── Frontend: Next.js ────────────────────────────────────────
  - type: web
    name: bella-vista-restaurant
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOSTNAME
        value: 0.0.0.0
